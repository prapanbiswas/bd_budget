<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BD Budget Analytics Platform logo">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0D1F3C"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00E5C8"/>
      <stop offset="100%" stop-color="#06D6A0"/>
    </linearGradient>
    <linearGradient id="bar-grad2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7C6EFA"/>
      <stop offset="100%" stop-color="#4EA8DE"/>
    </linearGradient>
    <linearGradient id="bar-grad3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#F42A41"/>
      <stop offset="100%" stop-color="#C41230"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5C8"/>
      <stop offset="50%" stop-color="#7C6EFA"/>
      <stop offset="100%" stop-color="#F42A41"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="url(#bg-grad)"/>

  <!-- Subtle border glow -->
  <rect x="1" y="1" width="198" height="198" rx="39" fill="none" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.35"/>

  <!-- Top glow arc -->
  <path d="M40 0 Q100 -4 160 0" stroke="url(#ring-grad)" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Bangladesh flag mini circle (top-left accent) -->
  <circle cx="34" cy="38" r="12" fill="#006A4E" opacity="0.9"/>
  <circle cx="32" cy="38" r="7" fill="#F42A41"/>

  <!-- Chart bars — the core icon -->
  <!-- Bar 3 (tallest, leftmost) -->
  <rect x="44" y="78" width="22" height="78" rx="5" fill="url(#bar-grad)" filter="url(#glow)" opacity="0.95"/>
  <!-- Bar 2 (medium) -->
  <rect x="78" y="100" width="22" height="56" rx="5" fill="url(#bar-grad2)" opacity="0.95"/>
  <!-- Bar 1 (shorter) -->
  <rect x="112" y="118" width="22" height="38" rx="5" fill="url(#bar-grad)" opacity="0.75"/>
  <!-- Bar 0 (smallest) -->
  <rect x="146" y="132" width="22" height="24" rx="5" fill="url(#bar-grad3)" opacity="0.9"/>

  <!-- Upward trend line over bars -->
  <polyline points="55,74 89,96 123,114 157,128" stroke="url(#ring-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7" filter="url(#glow)"/>
  <!-- Trend dots -->
  <circle cx="55" cy="74" r="3.5" fill="#00E5C8" filter="url(#glow)"/>
  <circle cx="89" cy="96" r="3.5" fill="#7C6EFA" filter="url(#glow)"/>
  <circle cx="123" cy="114" r="3.5" fill="#00E5C8" filter="url(#glow)"/>
  <circle cx="157" cy="128" r="3.5" fill="#F42A41" filter="url(#glow)"/>

  <!-- Baseline -->
  <line x1="36" y1="160" x2="172" y2="160" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- "BD" text wordmark at bottom -->
  <text x="100" y="186" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="15" font-weight="800" fill="white" text-anchor="middle" letter-spacing="3" opacity="0.9">BD BUDGET</text>
</svg>
